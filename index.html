<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Steam Status Tracker</title>
    <style>
        body { background: #1b2838; color: white; font-family: sans-serif; text-align: center; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .region { padding: 10px; border-radius: 5px; background: #2a475e; min-width: 100px; }
        .Online { border-left: 5px solid #66c0f4; }
        .Offline { border-left: 5px solid #a34c4c; }
        h1 { color: #66c0f4; }
    </style>
</head>
<body>
    <h1>Steam Server Status</h1>
    <div id="update">Chargement...</div>
    <div id="container" class="grid"></div>

    <script>
        fetch('status.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('update').innerText = "Dernière mise à jour : " + data.last_update;
                const container = document.getElementById('container');
                for (const [name, status] of Object.entries(data.regions)) {
                    container.innerHTML += `<div class="region ${status}"><strong>${name.toUpperCase()}</strong><br>${status}</div>`;
                }
            });
    </script>
</body>
</html>
