name: Steam Status Sync
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:    

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        run: python check_status.py
      - name: Commit and push changes
        run: |
          git config --global user.name 'SteamStatusBot'
          git config --global user.email 'bot@github.com'
          git add status.json
          git commit -m "Auto-update Steam Status" || exit 0
          git push
